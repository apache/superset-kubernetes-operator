name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-integration:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.3.0
        with:
          go-version-file: go.mod
      - name: Test
        run: make test-unit test-integration
      - name: Upload unit test coverage
        if: always()
        uses: codecov/codecov-action@0565863a31f35c3f4b6abce8e0e3cfa8a8489350 # v5.4.3
        with:
          files: cover_ut.out
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload integration test coverage
        if: always()
        uses: codecov/codecov-action@0565863a31f35c3f4b6abce8e0e3cfa8a8489350 # v5.4.3
        with:
          files: cover.out
          flags: integration
          token: ${{ secrets.CODECOV_TOKEN }}

  # TODO: enable E2E tests once test infrastructure is ready
  # e2e:
  #   ...
