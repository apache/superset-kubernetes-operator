name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit-integration:
    name: Unit & Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.3.0
        with:
          go-version-file: go.mod
      - name: Test
        run: make test-unit test-integration

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.3.0
        with:
          go-version-file: go.mod
      - name: Install kind
        run: |
          KIND_VERSION="v0.27.0"
          KIND_CHECKSUM="a6875aaea358acf0ac07786b1a6755d08fd640f4c79b7a2e46681cc13f49a04b" # linux-amd64
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          echo "${KIND_CHECKSUM}  ./kind" | sha256sum -c -
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
      - name: Verify kind installation
        run: kind version
      - name: Run E2E tests
        run: make test-e2e
