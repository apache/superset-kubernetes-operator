name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  # Images are published to GHCR. The default image in Makefile/Helm uses
  # apachesuperset.docker.scarf.sh — a Scarf analytics proxy that transparently
  # redirects to GHCR, providing download metrics without affecting pulls.
  IMAGE_NAME: ghcr.io/apache/superset-kubernetes-operator

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign OIDC signing

jobs:
  release:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # On push to main: sha-<short-sha>
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            # On push to main: floating dev tag (latest main build)
            type=raw,value=dev,enable={{is_default_branch}}
            # On tag push: strip 'v' prefix (v0.1.0 -> 0.1.0, v0.1.0-rc1 -> 0.1.0-rc1)
            type=semver,pattern={{version}}
            # On non-prerelease tag push: latest
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-') }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign image with cosign
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
        run: |
          cosign sign --yes "${{ env.IMAGE_NAME }}@${DIGEST}"

      # TODO: Automate Helm chart appVersion update during release.
      # For tag-based releases, consider a step that updates
      # charts/superset-operator/Chart.yaml appVersion to match the
      # release version and commits/PRs the change.
